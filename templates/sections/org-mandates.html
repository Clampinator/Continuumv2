
  <!--===================-->
  <!-- MANDATES SECTION -->
  <!--===================-->
  <div class="section-container">
  <input type="checkbox" id="toggle-org-mandates-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-org-mandates-" actor.id))}}checked{{/if}}>
  <div class="section-header-row">
    <label for="toggle-org-mandates-{{actor.id}}" class="section-heading-toggle">
      <h2 class="section-heading">{{localize "CONTINUUM.OrgMandates.Title"}}</h2>
    </label>
    <div class="org-mandates-controls">
      <button type="button" class="org-mandates-help" eventTitle="{{localize 'CONTINUUM.Common.Help'}}"><i class="fas fa-question"></i></button>
      <button type="button" class="item-add" data-type="mandate" data-tooltip="{{localize 'CONTINUUM.OrgMandates.AddMandate'}}"><i class="fas fa-plus"></i> {{localize "CONTINUUM.Common.Add"}}</button>
    </div>
  </div>
    <div class="section-content">
      <!-- The list of all mandates. Reuses 'goals-list' for styling. -->
      <div class="goals-list">
        {{#each mandates as |mandate|}}
          <!-- A single mandate item. Reuses 'goal-item' for styling. -->
                    <div class="goal-item" data-id="{{mandate.id}}" data-importance="{{mandate.importance}}">
            <!-- First row for the description and importance. Reuses 'goal-row'. -->
            <div class="goal-row">
              <label class="goal-label">{{localize "CONTINUUM.OrgMandates.WeWill"}}</label>
              <input type="text" class="goal-description" name="system.mandates.{{mandate.id}}.description" value="{{mandate.description}}" placeholder="{{localize 'CONTINUUM.OrgMandates.WeWillPlaceholder'}}"/>
              <select class="goal-importance" name="system.mandates.{{mandate.id}}.importance">
                <option value="" disabled {{#unless mandate.importance}}selected{{/unless}}>{{localize "CONTINUUM.Goals.Importance"}}</option>
                <option value="Passing" {{#if (eq mandate.importance "Passing")}}selected{{/if}}>{{localize "CONTINUUM.Goals.Passing"}}</option>
                <option value="Mild" {{#if (eq mandate.importance "Mild")}}selected{{/if}}>{{localize "CONTINUUM.Goals.Mild"}}</option>
                <option value="Important" {{#if (eq mandate.importance "Important")}}selected{{/if}}>{{localize "CONTINUUM.Goals.Important"}}</option>
                <option value="Extreme" {{#if (eq mandate.importance "Extreme")}}selected{{/if}}>{{localize "CONTINUUM.Goals.Extreme"}}</option>
                <option value="Critical" {{#if (eq mandate.importance "Critical")}}selected{{/if}}>{{localize "CONTINUUM.Goals.Critical"}}</option>
                <option value="Achieved" {{#if (eq mandate.importance "Achieved")}}selected{{/if}}>{{localize "CONTINUUM.OrgMandates.Achieved"}}</option>
              </select>
            </div>
            <!-- Second row for the condition and controls. Reuses 'goal-row'. -->
            <div class="goal-row">
              <label class="goal-label">{{localize "CONTINUUM.OrgMandates.By"}}</label>
              <input type="text" class="goal-condition" name="system.mandates.{{mandate.id}}.condition" value="{{mandate.condition}}" placeholder="{{localize 'CONTINUUM.OrgMandates.ByPlaceholder'}}"/>
              <div class="goal-controls">
                  <a class="item-delete" data-tooltip="{{localize 'CONTINUUM.OrgMandates.DeleteMandate'}}" data-type="mandate" data-id="{{mandate.id}}"><i class="fas fa-trash"></i></a>
              </div>
            </div>
          </div>
        {{/each}}
      </div>
    </div>
  </div>
