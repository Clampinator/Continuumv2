<div class="section-container">
    <input type="checkbox" id="toggle-location-details-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-location-details-" actor.id))}}checked{{/if}}>
    <div class="section-header-row">
        <label for="toggle-location-details-{{actor.id}}" class="section-heading-toggle">
            <h2 class="section-heading">{{localize "CONTINUUM.LocationDetails.Title"}}</h2>
        </label>
        {{#if isGM}}
        <label class="location-reveal-toggle" eventTitle="{{#if revealedOnOrgMap}}{{localize 'CONTINUUM.LocationDetails.HideFromOrgMap'}}{{else}}{{localize 'CONTINUUM.LocationDetails.RevealOnOrgMap'}}{{/if}}">
            <input type="checkbox" class="reveal-on-org-map sheet-hidden" {{#if revealedOnOrgMap}}checked{{/if}} />
            <i class="fas {{#if revealedOnOrgMap}}fa-eye{{else}}fa-eye-slash{{/if}}"></i>
            <span>{{localize "CONTINUUM.LocationDetails.OrgMap"}}</span>
        </label>
        {{/if}}
    </div>
    
    <div class="section-content">
        <div class="columns">
            <div class="column">
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.LocationName"}}</label>
                    <input type="text" name="system.details.name" value="{{system.details.name}}" placeholder="{{localize 'CONTINUUM.LocationDetails.LocationNamePlaceholder'}}">
                </div>
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.Locality"}}</label>
                    <input type="text" name="system.details.locality" value="{{system.details.locality}}" placeholder="{{localize 'CONTINUUM.LocationDetails.LocalityPlaceholder'}}">
                </div>
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.Society"}}</label>
                    <input type="text" name="system.details.society" value="{{system.details.society}}" placeholder="{{localize 'CONTINUUM.LocationDetails.SocietyPlaceholder'}}">
                </div>
            </div>
            <div class="column">
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.Coordinates"}}</label>
                    <div style="display: flex; gap: 4px; width: 100%; align-items: center;">
                        <input type="number" step="any" name="system.map.lat" value="{{system.map.lat}}" placeholder="{{localize 'CONTINUUM.LocationDetails.Latitude'}}" style="flex: 1;" eventTitle="{{localize 'CONTINUUM.LocationDetails.Latitude'}}">
                        <input type="number" step="any" name="system.map.lng" value="{{system.map.lng}}" placeholder="{{localize 'CONTINUUM.LocationDetails.Longitude'}}" style="flex: 1;" eventTitle="{{localize 'CONTINUUM.LocationDetails.Longitude'}}">
                        <button type="button" class="geocode-location-btn" eventTitle="{{localize 'CONTINUUM.LocationDetails.GeocodeLocation'}}" style="flex: 0 0 auto; padding: 2px 8px;"><i class="fas fa-map-marker-alt"></i></button>
                    </div>
                </div>
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.TemporalTargetYear"}}</label>
                    <div style="display: flex; gap: 8px; width: 100%;">
                        <input type="number" name="system.details.year" value="{{system.details.year}}" placeholder="{{localize 'CONTINUUM.LocationDetails.Year'}}" style="flex: 1;">
                        <select name="system.details.era" style="width: 80px;">
                            <option value="CE" {{#if (eq system.details.era "CE")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.CE"}}</option>
                            <option value="BCE" {{#if (eq system.details.era "BCE")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.BCE"}}</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <label>{{localize "CONTINUUM.LocationDetails.Continent"}}</label>
                    <select name="system.details.continent">
                        <option value="">{{localize "CONTINUUM.LocationDetails.GlobalScope"}}</option>
                        <option value="Africa" {{#if (eq system.details.continent "Africa")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.Africa"}}</option>
                        <option value="Antarctica" {{#if (eq system.details.continent "Antarctica")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.Antarctica"}}</option>
                        <option value="Asia" {{#if (eq system.details.continent "Asia")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.Asia"}}</option>
                        <option value="Europe" {{#if (eq system.details.continent "Europe")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.Europe"}}</option>
                        <option value="North America" {{#if (eq system.details.continent "North America")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.NorthAmerica"}}</option>
                        <option value="Oceania" {{#if (eq system.details.continent "Oceania")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.Oceania"}}</option>
                        <option value="South America" {{#if (eq system.details.continent "South America")}}selected{{/if}}>{{localize "CONTINUUM.LocationDetails.SouthAmerica"}}</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
