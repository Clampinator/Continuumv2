<!--====================-->
<!-- ATTRIBUTES SECTION -->
<!--====================-->
<div class="section-container">
      <input type="checkbox" id="toggle-attributes-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-attributes-" actor.id))}}checked{{/if}}>
  <div class="section-header-row">
      <label for="toggle-attributes-{{actor.id}}" class="section-heading-toggle">
          <h2 class="section-heading">{{localize "CONTINUUM.Attributes.Title"}}</h2>
      </label>
      <div class="attributes-controls">
        <button type="button" class="attributes-help" eventTitle="{{localize 'CONTINUUM.Common.Help'}}"><i class="fas fa-question"></i></button>
      </div>
  </div>
  <div class="attributes-container">
    <!-- Character Image -->
    <div class="character-image-wrapper">
      <div class="character-image-container">
        <img class="character-image" src="{{actor.img}}" data-edit="img" eventTitle="{{actor.name}}"/>
      </div>
      <button type="button" class="token-image-pick" eventTitle="{{localize 'CONTINUUM.Attributes.SetTokenImage'}}"></button>
    </div>

    <div class="attributes-single-row">
      <!-- Force Block -->
      <div class="attribute-block" data-aspect="force">
        <button type="button" class="roll-attribute" data-attribute="force" data-tooltip="{{localize 'CONTINUUM.Attributes.RollForce'}}">{{localize "CONTINUUM.Attributes.Force"}}</button>
        <div class="attribute-spinner-viewport" data-attribute="force">
          <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="Force Value Spinner">
        </div>
        <input type="hidden" name="system.attributes.force.value" value="{{system.attributes.force.value}}">
        <div class="progress-thermo" data-aspect="force"></div>
      </div>

      <!-- Analyze Block -->
      <div class="attribute-block" data-aspect="analyze">
        <button type="button" class="roll-attribute" data-attribute="analyze" data-tooltip="{{localize 'CONTINUUM.Attributes.RollAnalyze'}}">{{localize "CONTINUUM.Attributes.Analyze"}}</button>
        <div class="attribute-spinner-viewport" data-attribute="analyze">
          <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="Analyze Value Spinner">
        </div>
        <input type="hidden" name="system.attributes.analyze.value" value="{{system.attributes.analyze.value}}">
        <div class="progress-thermo" data-aspect="analyze"></div>
      </div>

      <!-- Relate Block -->
      <div class="attribute-block" data-aspect="relate">
        <button type="button" class="roll-attribute" data-attribute="relate" data-tooltip="{{localize 'CONTINUUM.Attributes.RollRelate'}}">{{localize "CONTINUUM.Attributes.Relate"}}</button>
        <div class="attribute-spinner-viewport" data-attribute="relate">
          <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="Relate Value Spinner">
        </div>
        <input type="hidden" name="system.attributes.relate.value" value="{{system.attributes.relate.value}}">
        <div class="progress-thermo" data-aspect="relate"></div>
      </div>

      <!-- React Block -->
      <div class="attribute-block" data-aspect="react">
        <button type="button" class="roll-attribute" data-attribute="react" data-tooltip="{{localize 'CONTINUUM.Attributes.RollReact'}}">{{localize "CONTINUUM.Attributes.React"}}</button>
        <div class="attribute-spinner-viewport" data-attribute="react">
          <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="React Value Spinner">
        </div>
        <input type="hidden" name="system.attributes.react.value" value="{{system.attributes.react.value}}">
        <div class="progress-thermo" data-aspect="react"></div>
      </div>

      <!-- Willpower Column -->
      <div class="willpower-column">
        <div class="attribute-block willpower-block">
          <button type="button" class="roll-attribute" data-attribute="willpowerTemp" data-tooltip="{{localize 'CONTINUUM.Attributes.RollTempWill'}}">{{localize "CONTINUUM.Attributes.TempWillLabel"}}</button>
          <div class="attribute-spinner-viewport" data-attribute="willpowerTemp">
            <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="Temp Will Value Spinner">
          </div>
          <input type="hidden" name="system.attributes.willpower.temp" value="{{system.attributes.willpower.temp}}">
        </div>
        <div class="attribute-block willpower-block">
          <button type="button" class="roll-attribute" data-attribute="willpowerPerm" data-tooltip="{{localize 'CONTINUUM.Attributes.RollPermWill'}}">{{localize "CONTINUUM.Attributes.PermWillLabel"}}</button>
          <div class="attribute-spinner-viewport" data-attribute="willpowerPerm">
            <img src="assets/Continuum UI/AttributesCounter.png" class="attribute-spinner-image" alt="Perm Will Value Spinner">
          </div>
          <input type="hidden" name="system.attributes.willpower.perm" value="{{system.attributes.willpower.perm}}">
        </div>
      </div>
    </div>

    <!-- Benefits Box -->
    <div class="benefits-limits-container">
      <h3>{{localize "CONTINUUM.Attributes.Benefits"}}</h3>
      <div class="benefits-scroll-list">
        {{#each benefitsList}}
        <label class="benefit-item" eventTitle="{{description}}">
          <input type="checkbox" class="benefit-checkbox" data-benefit-id="{{id}}" {{#if selected}}checked{{/if}}>
          {{name}}
        </label>
        {{/each}}
      </div>
    </div>
  </div>
</div>
