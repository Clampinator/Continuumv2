<!-- ================= -->
<!-- THE YET SECTION   -->
<!-- ================= -->
<div class="section-container">
  <input type="checkbox" id="toggle-yet-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-yet-" actor.id))}}checked{{/if}}>
  <div class="section-header-row">
    <label for="toggle-yet-{{actor.id}}" class="section-heading-toggle">
      <h2 class="section-heading">{{localize "CONTINUUM.TheYet.Title"}}</h2>
    </label>
    <div class="the-yet-controls">
      <button type="button" class="the-yet-help" eventTitle="{{localize 'CONTINUUM.Common.Help'}}"><i class="fas fa-question"></i></button>
      <button type="button" class="item-add" data-type="yetItem" data-tooltip="{{localize 'CONTINUUM.TheYet.AddYetItem'}}"><i class="fas fa-plus"></i> {{localize "CONTINUUM.Common.Add"}}</button>
    </div>
  </div>

  <div class="yet-list">
    <!-- Header Row -->
    <div class="yet-item-header">
      <div class="yet-description">{{localize "CONTINUUM.TheYet.InTheYet"}}</div>
      <div class="yet-done">{{localize "CONTINUUM.TheYet.Done"}}</div>
      <div class="yet-frag">{{localize "CONTINUUM.TheYet.Frag"}}</div>
      <div class="yet-when">{{localize "CONTINUUM.TheYet.When"}}</div>
      <div class="yet-controls"></div>
    </div>

    <!-- Repeating Items List -->
    {{#each yetItems as |yet|}}
    <div class="yet-item" data-id="{{yet.id}}">
      <div class="yet-description">
        <input type="text" name="system.theYet.{{yet.id}}.description" value="{{yet.description}}" placeholder="{{localize 'CONTINUUM.TheYet.Placeholder'}}"/>
      </div>
      <div class="yet-done">
        <input type="checkbox" name="system.theYet.{{yet.id}}.done" {{#if yet.done}}checked{{/if}}/>
      </div>
      <div class="yet-frag">
        <input type="number" name="system.theYet.{{yet.id}}.frag" value="{{yet.frag}}" max="99" min="0"/>
      </div>
      <div class="yet-when">
        <input type="date" name="system.theYet.{{yet.id}}.date" value="{{yet.date}}"/>
        <input type="time" name="system.theYet.{{yet.id}}.time" value="{{yet.time}}"/>
      </div>
      <div class="yet-controls">
        <a class="item-delete {{#unless (isDeletable yet 'yetItem')}}disabled{{/unless}}" eventTitle="{{#unless (isDeletable yet 'yetItem')}}{{localize 'CONTINUUM.Common.CannotDeleteWithContent'}}{{else}}{{localize 'CONTINUUM.TheYet.DeleteYet'}}{{/unless}}" data-type="yetItem" data-id="{{yet.id}}"><i class="fas fa-trash"></i></a>
      </div>
    </div>
    {{/each}}
  </div>
</div>
