<div class="section-container">
    <input type="checkbox" id="toggle-location-attributes-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-location-attributes-" actor.id))}}checked{{/if}}>
    <div class="section-header-row">
        <label for="toggle-location-attributes-{{actor.id}}" class="section-heading-toggle">
            <h2 class="section-heading">{{localize "CONTINUUM.LocationAttrs.Title"}}</h2>
        </label>
    </div>
    
    <div class="section-content">
        <div class="attributes-container location-attributes">
            <!-- Location Image (Flag Aspect Ratio) -->
            <div class="character-image-container location-image-container">
                <img class="character-image" src="{{actor.img}}" data-edit="img" eventTitle="{{actor.name}}"/>
            </div>

            <!-- Core Attributes -->
            <div class="attributes-single-row">
                <div class="attribute-block">
                    <button type="button" class="roll-attribute" data-attribute="scale">{{localize "CONTINUUM.LocationAttrs.Scale"}}</button>
                    <input type="number" name="system.attributes.scale.value" value="{{system.attributes.scale.value}}" min="0" max="10">
                </div>
                <div class="attribute-block">
                    <button type="button" class="roll-attribute" data-attribute="output">{{localize "CONTINUUM.LocationAttrs.Output"}}</button>
                    <input type="number" name="system.attributes.output.value" value="{{system.attributes.output.value}}" min="0" max="10">
                </div>
                <div class="attribute-block">
                    <button type="button" class="roll-attribute" data-attribute="cohesion">{{localize "CONTINUUM.LocationAttrs.Cohesion"}}</button>
                    <input type="number" name="system.attributes.cohesion.value" value="{{system.attributes.cohesion.value}}" min="0" max="10">
                </div>
                <div class="attribute-block">
                    <button type="button" class="roll-attribute" data-attribute="civics">{{localize "CONTINUUM.LocationAttrs.Civics"}}</button>
                    <input type="number" name="system.attributes.civics.value" value="{{system.attributes.civics.value}}" min="0" max="10">
                </div>
            </div>

            <!-- Spendable Pools -->
            <div class="attribute-column-dual">
                <div class="attribute-block capital-block">
                    <span class="static-text">{{localize "CONTINUUM.LocationAttrs.Capital"}}</span>
                    <div class="pool-inputs">
                        <input type="number" name="system.attributes.capital.value" value="{{system.attributes.capital.value}}" eventTitle="{{localize 'CONTINUUM.LocationAttrs.Current'}}">
                        <span>/</span>
                        <input type="number" name="system.attributes.capital.max" value="{{system.attributes.capital.max}}" eventTitle="{{localize 'CONTINUUM.LocationAttrs.Max'}}">
                    </div>
                </div>
                <div class="attribute-block momentum-block">
                    <span class="static-text">{{localize "CONTINUUM.LocationAttrs.Momentum"}}</span>
                    <div class="pool-inputs">
                        <input type="number" name="system.attributes.momentum.value" value="{{system.attributes.momentum.value}}" eventTitle="{{localize 'CONTINUUM.LocationAttrs.Current'}}">
                        <span>/</span>
                        <input type="number" name="system.attributes.momentum.max" value="{{system.attributes.momentum.max}}" eventTitle="{{localize 'CONTINUUM.LocationAttrs.Max'}}">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
