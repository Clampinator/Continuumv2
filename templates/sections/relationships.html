

<!-- ===================== -->
<!-- RELATIONSHIPS SECTION -->
<!-- ===================== -->
<div class="section-container">
  <input type="checkbox" id="toggle-relationships-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-relationships-" actor.id))}}checked{{/if}}>
  <div class="section-header-row">
    <label for="toggle-relationships-{{actor.id}}" class="section-heading-toggle">
      <h2 class="section-heading">{{localize "CONTINUUM.Relationships.Title"}}</h2>
    </label>
    <div class="relationships-controls">
      <button type="button" class="relationships-help" eventTitle="{{localize 'CONTINUUM.Common.Help'}}"><i class="fas fa-question"></i></button>
      <button type="button" class="item-add" data-type="relationship" data-tooltip="{{localize 'CONTINUUM.Relationships.AddRelationship'}}"><i class="fas fa-plus"></i> {{localize "CONTINUUM.Common.Add"}}</button>
    </div>
  </div>

  <div class="relationships-list">
    <!-- Header Row -->
    <div class="relationship-item-header">
       <div class="relationship-name">{{localize "CONTINUUM.Relationships.Name"}}</div>
       <div class="relationship-type">{{localize "CONTINUUM.Relationships.RelationshipType"}}</div>
       <div class="relationship-importance">{{localize "CONTINUUM.Relationships.Sphere"}}</div>
       <div class="relationship-when">{{localize "CONTINUUM.Relationships.When"}}</div>
       <div class="relationship-where">{{localize "CONTINUUM.Relationships.Where"}}</div>
      <div class="relationship-controls"></div> <!-- Spacer for delete button -->
    </div>

    <!-- Repeating Items List -->
    {{#each relationships as |rel|}}
    <div class="relationship-item" data-id="{{rel.id}}">
      <div class="relationship-item-main-row">
        <div class="relationship-name">
           <input type="text" name="system.relationships.{{rel.id}}.name" value="{{rel.name}}" placeholder="{{localize 'CONTINUUM.Relationships.CharacterNamePlaceholder'}}"/>
        </div>
        <div class="relationship-type">
          <select name="system.relationships.{{rel.id}}.relationshipType">
             <option value="" disabled {{#unless rel.relationshipType}}selected{{/unless}}>{{localize "CONTINUUM.Relationships.SelectType"}}</option>
             <option value="Sibling" {{#if (eq rel.relationshipType "Sibling")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Sibling"}}</option>
             <option value="Parent" {{#if (eq rel.relationshipType "Parent")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Parent"}}</option>
             <option value="Grandparent" {{#if (eq rel.relationshipType "Grandparent")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Grandparent"}}</option>
             <option value="Aunt" {{#if (eq rel.relationshipType "Aunt")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Aunt"}}</option>
             <option value="Uncle" {{#if (eq rel.relationshipType "Uncle")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Uncle"}}</option>
             <option value="Cousin" {{#if (eq rel.relationshipType "Cousin")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Cousin"}}</option>
             <option value="Friend" {{#if (eq rel.relationshipType "Friend")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Friend"}}</option>
             <option value="Ex" {{#if (eq rel.relationshipType "Ex")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Ex"}}</option>
             <option value="Partner" {{#if (eq rel.relationshipType "Partner")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Partner"}}</option>
             <option value="Progeny" {{#if (eq rel.relationshipType "Progeny")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Progeny"}}</option>
             <option value="Spouse" {{#if (eq rel.relationshipType "Spouse")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Spouse"}}</option>
             <option value="Acquaintance" {{#if (eq rel.relationshipType "Acquaintance")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Acquaintance"}}</option>
             <option value="Subordinate" {{#if (eq rel.relationshipType "Subordinate")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Subordinate"}}</option>
             <option value="Superior" {{#if (eq rel.relationshipType "Superior")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Superior"}}</option>
             <option value="Colleague" {{#if (eq rel.relationshipType "Colleague")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Colleague"}}</option>
          </select>
        </div>
        <div class="relationship-importance">
          <select name="system.relationships.{{rel.id}}.importance">
             <option value="" disabled {{#unless rel.importance}}selected{{/unless}}>{{localize "CONTINUUM.Relationships.SelectType"}}</option>
             <option value="Public" {{#if (eq rel.importance "Public")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Public"}}</option>
             <option value="Social" {{#if (eq rel.importance "Social")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Social"}}</option>
             <option value="Professional" {{#if (eq rel.importance "Professional")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Professional"}}</option>
             <option value="Personal" {{#if (eq rel.importance "Personal")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Personal"}}</option>
             <option value="Intimate" {{#if (eq rel.importance "Intimate")}}selected{{/if}}>{{localize "CONTINUUM.Relationships.Intimate"}}</option>
          </select>
        </div>
        <div class="relationship-when">
          <div class="date-picker-container">
            <input type="text" class="date-text-input" name="system.relationships.{{rel.id}}.when" value="{{rel.when}}" placeholder="YYYY-MM-DD" />
            <i class="fas fa-calendar-alt date-picker-icon"></i>
            <input type="date" class="date-picker-hidden" tabindex="-1" />
          </div>
        </div>
        <div class="relationship-where">
           <input type="text" name="system.relationships.{{rel.id}}.where" value="{{rel.where}}" placeholder="{{localize 'CONTINUUM.Relationships.LocationMet'}}"/>
        </div>
        <div class="relationship-controls">
           <a class="item-delete {{#unless (isDeletable rel 'relationship')}}disabled{{/unless}}" eventTitle="{{#unless (isDeletable rel 'relationship')}}{{localize 'CONTINUUM.Common.CannotDeleteWithContent'}}{{else}}{{localize 'CONTINUUM.Relationships.DeleteRelationship'}}{{/unless}}" data-type="relationship" data-id="{{rel.id}}"><i class="fas fa-trash"></i></a>
        </div>
      </div>
      <textarea name="system.relationships.{{rel.id}}.eventNotes" class="js-auto-expand no-paragraph-style" placeholder="{{localize 'CONTINUUM.Relationships.EventNotes'}}">{{~rel.eventNotes~}}</textarea>
      
      <!-- Folded Favors Section -->
      <div class="relationship-favor-row">
         <label class="favor-label">{{localize "CONTINUUM.Relationships.Favor"}}</label>
         <input type="text" class="favor-description" name="system.relationships.{{rel.id}}.favor.description" value="{{rel.favor.description}}" placeholder="{{localize 'CONTINUUM.Relationships.FavorPlaceholder'}}"/>
        <select class="favor-importance" name="system.relationships.{{rel.id}}.favor.importance">
             <option value="" disabled {{#unless rel.favor.importance}}selected{{/unless}}>{{localize "CONTINUUM.Relationships.FavorImportance"}}</option>
             <option value="Critical" {{#if (eq rel.favor.importance "Critical")}}selected{{/if}}>{{localize "CONTINUUM.Favors.Critical"}}</option>
             <option value="Extremely Important" {{#if (eq rel.favor.importance "Extremely Important")}}selected{{/if}}>{{localize "CONTINUUM.Favors.ExtremelyImportant"}}</option>
             <option value="Very Important" {{#if (eq rel.favor.importance "Very Important")}}selected{{/if}}>{{localize "CONTINUUM.Favors.VeryImportant"}}</option>
             <option value="Important" {{#if (eq rel.favor.importance "Important")}}selected{{/if}}>{{localize "CONTINUUM.Favors.Important"}}</option>
             <option value="Moderately Important" {{#if (eq rel.favor.importance "Moderately Important")}}selected{{/if}}>{{localize "CONTINUUM.Favors.ModeratelyImportant"}}</option>
             <option value="Less Important" {{#if (eq rel.favor.importance "Less Important")}}selected{{/if}}>{{localize "CONTINUUM.Favors.LessImportant"}}</option>
             <option value="Unimportant" {{#if (eq rel.favor.importance "Unimportant")}}selected{{/if}}>{{localize "CONTINUUM.Favors.Unimportant"}}</option>
             <option value="Done" {{#if (eq rel.favor.importance "Done")}}selected{{/if}}>{{localize "CONTINUUM.Favors.Done"}}</option>
        </select>
        
        <div class="date-picker-container favor-when" style="flex: 0 0 120px;">
            <input type="text" class="date-text-input" name="system.relationships.{{rel.id}}.favor.when" value="{{rel.favor.when}}" placeholder="YYYY-MM-DD" />
            <i class="fas fa-calendar-alt date-picker-icon"></i>
            <input type="date" class="date-picker-hidden" tabindex="-1" />
        </div>

      </div>
    </div>
    {{/each}}
  </div>
</div>
