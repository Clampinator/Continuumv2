
<div class="all-lifelines-container" style="display: flex; flex-direction: column; height: 100%;">
    
    <!-- Actor Legend / Controls -->
    <div class="lifelines-sidebar" style="padding: 10px; background: #222; border-bottom: 1px solid #444; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
        <h3 style="margin: 0; color: #ccc; margin-right: 15px;">{{localize "CONTINUUM.AllLifelines.TrackedSpanners"}}</h3>
        {{#each actors as |actor|}}
        <div class="actor-chip" style="background: #333; padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; border-left: 4px solid {{actor.color}};">
            <span style="color: #fff; font-weight: bold; margin-right: 8px;">{{actor.name}}</span>
            <a class="remove-actor" data-id="{{actor.id}}" style="color: #aaa; cursor: pointer;"><i class="fas fa-times"></i></a>
        </div>
        {{/each}}
        {{#unless actors}}
        <div style="color: #666; font-style: italic;">{{localize "CONTINUUM.AllLifelines.DragDropActors"}}</div>
        {{/unless}}
    </div>

    <!-- Graph Wrapper (Reusing CSS classes from span_graph.html) -->
    <div class="span-graph-wrapper" style="flex-grow: 1; border: none; border-radius: 0;">
        <div class="span-graph-container" style="height: 100%;">
            <svg class="span-graph-svg" width="100%" height="100%">
                <defs>
                    <linearGradient id="expFadeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:rgba(255, 180, 0, 0.4); stop-opacity:1" />
                        <stop offset="60%" style="stop-color:rgba(255, 180, 0, 0.1); stop-opacity:0.5" />
                        <stop offset="100%" style="stop-color:rgba(255, 180, 0, 0.0); stop-opacity:0" />
                    </linearGradient>
                </defs>
                
                <g class="graph-grid-layer">
                    <rect width="100%" height="100%" fill="#050508" />
                    <g class="graph-grid-lines"></g>
                </g>

                <g class="graph-ages-layer"></g>
                <g class="graph-experiences-layer"></g>

                <g class="graph-path-layer">
                    <!-- Paths will be injected dynamically -->
                </g>

                <g class="graph-ui-layer">
                    <g class="graph-axis-labels"></g>
                    <g class="graph-labels-group"></g> 
                    <g class="graph-nodes-group"></g>
                    
                    <line class="graph-drag-line" display="none"></line>
                    
                    <g class="graph-tooltip-group" display="none" style="pointer-events: none;">
                        <rect class="tooltip-bg" rx="4" ry="4"></rect>
                        <text class="tooltip-text"></text>
                    </g>
                </g>
            </svg>
        </div>
        <div class="graph-instructions">
            <span><i class="fas fa-arrows-alt"></i> {{localize "CONTINUUM.AllLifelines.PanZoom"}}</span>
            <span><i class="fas fa-plus"></i> {{localize "CONTINUUM.AllLifelines.DragActorsToAdd"}}</span>
        </div>
    </div>
</div>
