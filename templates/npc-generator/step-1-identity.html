<div class="step-content step-identity">
  <h3>Identity</h3>

  <div class="form-group">
    <label for="npc-name">Name <span class="optional">(optional - leave blank for AI generation)</span></label>
    <input type="text" id="npc-name" name="data.name" value="{{name}}" placeholder="Enter name or leave blank...">
  </div>

  <div class="form-group">
    <label for="npc-region">Region</label>
    <select id="npc-region" name="data.region">
      <option value="">-- Select Region --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="npc-culture">Culture</label>
    <select id="npc-culture" name="data.culture">
      <option value="">-- Select Region First --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="npc-pronouns">Pronouns</label>
    <input type="text" id="npc-pronouns" name="data.pronouns" value="{{pronouns}}" placeholder="e.g., they/them, she/her, he/him">
  </div>

  <div class="form-group">
    <button type="button" class="browse-names-btn">Browse Names</button>
    <span class="hint">Opens fantasynamegenerators.com based on selected culture</span>
  </div>
</div>
