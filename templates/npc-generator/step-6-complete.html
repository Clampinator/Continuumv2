<div class="step-content step-complete">
  <h3>{{localize "CONTINUUM.NpcGenerator.ActorCreated"}}</h3>
  <p class="complete-actor-name"></p>

  <div class="complete-link-section">
    <h4>{{localize "CONTINUUM.NpcGenerator.LinkToPc"}}</h4>
    <p class="complete-link-hint">{{localize "CONTINUUM.NpcGenerator.LinkToPcHint"}}</p>

    <div class="form-group">
      <label for="npc-pc-select">{{localize "CONTINUUM.NpcGenerator.PlayerCharacter"}}</label>
      <select id="npc-pc-select">
        <option value="">{{localize "CONTINUUM.NpcGenerator.SelectPc"}}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="npc-relationship-type">{{localize "CONTINUUM.Relationships.RelationshipType"}}</label>
      <select id="npc-relationship-type">
        <option value="Mentor">{{localize "CONTINUUM.Relationships.Mentor"}}</option>
        <option value="Student">{{localize "CONTINUUM.NpcGenerator.Student"}}</option>
        <option value="Friend">{{localize "CONTINUUM.Relationships.Friend"}}</option>
        <option value="Colleague">{{localize "CONTINUUM.Relationships.Colleague"}}</option>
        <option value="Rival">{{localize "CONTINUUM.Relationships.Rival"}}</option>
        <option value="Superior">{{localize "CONTINUUM.Relationships.Superior"}}</option>
        <option value="Subordinate">{{localize "CONTINUUM.Relationships.Subordinate"}}</option>
        <option value="Sibling">{{localize "CONTINUUM.Relationships.Sibling"}}</option>
        <option value="Parent">{{localize "CONTINUUM.Relationships.Parent"}}</option>
        <option value="Spouse">{{localize "CONTINUUM.Relationships.Spouse"}}</option>
        <option value="Acquaintance" selected>{{localize "CONTINUUM.Relationships.Acquaintance"}}</option>
      </select>
    </div>

    <button type="button" class="complete-link-btn">{{localize "CONTINUUM.NpcGenerator.LinkToPcBtn"}}</button>
  </div>

  <div class="complete-actions">
    <button type="button" class="complete-open-sheet-btn">{{localize "CONTINUUM.NpcGenerator.OpenCharacterSheet"}}</button>
    <button type="button" class="complete-close-btn">{{localize "CONTINUUM.NpcGenerator.Close"}}</button>
  </div>
</div>
