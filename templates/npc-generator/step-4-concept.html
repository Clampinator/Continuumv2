<div class="step-content step-concept">
  <h3>{{localize "CONTINUUM.NpcGenerator.ConceptHook"}}</h3>

  <div class="form-group">
    <label for="npc-role">{{localize "CONTINUUM.NpcGenerator.RoleInStory"}}</label>
    <select id="npc-role" name="data.role">
      <option value="Antagonist">{{localize "CONTINUUM.NpcGenerator.Antagonist"}}</option>
      <option value="Ally">{{localize "CONTINUUM.NpcGenerator.Ally"}}</option>
      <option value="Contact">{{localize "CONTINUUM.NpcGenerator.Contact"}}</option>
      <option value="Neutral" selected>{{localize "CONTINUUM.NpcGenerator.Neutral"}}</option>
      <option value="Unknown">{{localize "CONTINUUM.NpcGenerator.Unknown"}}</option>
    </select>
  </div>

  <div class="form-group">
    <label for="npc-dob">{{localize "CONTINUUM.NpcGenerator.DateOfBirth"}} <span class="required">*</span> <span class="optional">({{localize "CONTINUUM.NpcGenerator.RequiredForLifeline"}})</span></label>
    <input type="text" id="npc-dob" name="data.dob" value="{{dob}}" placeholder="1965-03-15" pattern="\d{4}-\d{2}-\d{2}">
  </div>

  <div class="form-group">
    <label for="npc-birth-location">{{localize "CONTINUUM.NpcGenerator.Birthplace"}} <span class="optional">({{localize "CONTINUUM.NpcGenerator.BirthplaceOptional"}})</span></label>
    <input type="text" id="npc-birth-location" name="data.birthLocation" value="{{birthLocation}}" placeholder="e.g. London, England">
  </div>

  <div class="form-group">
    <label for="npc-concept">{{localize "CONTINUUM.NpcGenerator.BriefConcept"}} <span class="optional">({{localize "CONTINUUM.NpcGenerator.BriefConceptOptional"}})</span></label>
    <textarea id="npc-concept" name="data.concept" rows="4" placeholder="{{localize 'CONTINUUM.NpcGenerator.ConceptPlaceholder'}}">{{concept}}</textarea>
  </div>

  <div class="form-group">
    <label for="npc-related-actor">{{localize "CONTINUUM.NpcGenerator.PreexistingRelationship"}}</label>
    <select id="npc-related-actor" name="data.relatedActorId">
      <option value="">{{localize "CONTINUUM.NpcGenerator.NoneSelect"}}</option>
    </select>
    <span class="hint">{{localize "CONTINUUM.NpcGenerator.SelectRelationshipHint"}}</span>
  </div>

  <div class="form-group">
    <label for="npc-gm-eventNotes">{{localize "CONTINUUM.NpcGenerator.GmNotes"}} <span class="optional">({{localize "CONTINUUM.NpcGenerator.GmNotesOptional"}})</span></label>
    <textarea id="npc-gm-eventNotes" name="data.gmNotes" rows="3" placeholder="{{localize 'CONTINUUM.NpcGenerator.GmNotesPlaceholder'}}">{{gmNotes}}</textarea>
  </div>
</div>
