<div class="step-content step-concept">
  <h3>Concept & Hook</h3>

  <div class="form-group">
    <label for="npc-role">Role in Story</label>
    <select id="npc-role" name="data.role">
      <option value="Antagonist">Antagonist</option>
      <option value="Ally">Ally</option>
      <option value="Contact">Contact</option>
      <option value="Neutral" selected>Neutral</option>
      <option value="Unknown">Unknown</option>
    </select>
  </div>

  <div class="form-group">
    <label for="npc-dob">Date of Birth <span class="required">*</span> <span class="optional">(required for lifeline, YYYY-MM-DD)</span></label>
    <input type="text" id="npc-dob" name="data.dob" value="{{dob}}" placeholder="1965-03-15" pattern="\d{4}-\d{2}-\d{2}">
  </div>

  <div class="form-group">
    <label for="npc-birth-location">Birthplace <span class="optional">(city, country for map placement)</span></label>
    <input type="text" id="npc-birth-location" name="data.birthLocation" value="{{birthLocation}}" placeholder="e.g. London, England">
  </div>

  <div class="form-group">
    <label for="npc-concept">Brief Concept <span class="optional">(2-3 sentences - seeds the AI narrative)</span></label>
    <textarea id="npc-concept" name="data.concept" rows="4" placeholder="Describe the character's role and motivation...">{{concept}}</textarea>
  </div>

  <div class="form-group">
    <label for="npc-related-actor">Pre-existing Relationship (optional)</label>
    <select id="npc-related-actor" name="data.relatedActorId">
      <option value="">-- None --</option>
    </select>
    <span class="hint">Select an existing actor to link as a relationship</span>
  </div>

  <div class="form-group">
    <label for="npc-gm-eventNotes">GM eventNotes <span class="optional">(secrets, plot hooks - AI will weave these in)</span></label>
    <textarea id="npc-gm-eventNotes" name="data.gmNotes" rows="3" placeholder="Any secrets or motivations you've already planned...">{{gmNotes}}</textarea>
  </div>
</div>
