
<!--=========================-->
<!-- RELATIONSHIP MAP SECTION -->
<!--=========================-->
<div class="section-container">
  <input type="checkbox" id="toggle-char-relationships-map-{{actor.id}}" class="sheet-hidden event-toggle-checkbox" {{#if (lookup toggles (concat "toggle-char-relationships-map-" actor.id))}}checked{{/if}}>
  <div class="section-header-row">
    <label for="toggle-char-relationships-map-{{actor.id}}" class="section-heading-toggle">
      <h2 class="section-heading">Relationship Map</h2>
    </label>
    <div class="network-controls" style="margin-left: auto; display: flex; gap: 8px;">
        <button type="button" class="network-add-node" title="Add Manual Node"><i class="fas fa-plus"></i></button>
        <button type="button" class="network-reset-zoom" title="Fit to View"><i class="fas fa-compress-arrows-alt"></i></button>
        <button type="button" class="network-help" title="Right-Drag between nodes to link. Right-click nodes to edit notes and favors."><i class="fas fa-question"></i></button>
    </div>
  </div>
  <div class="section-content" style="padding: 0;">
    <div class="org-network-wrapper" style="height: 500px; position: relative; background: #050508; border-radius: 0 0 5px 5px;">
        <!-- Specific container for Character Relationship Graph -->
        <div id="char-relationship-graph-{{actor.id}}" class="org-network-container" style="width: 100%; height: 100%;">
        </div>
        <!-- Timeline Controls Overlay -->
        <div class="network-timeline-controls" style="position: absolute; bottom: 60px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; z-index: 20;">
            <!-- D3 will inject HTML here via char-relationship-timeline.js -->
        </div>
    </div>
  </div>
</div>
