<form>
  <!-- Row 1: Situational Modifier -->
  <div class="dialog-row">
    <label>Situational Modifier</label>
    <input type="number" name="situational-modifier" value="0" />
  </div>

  <!-- Row 2: Resonance -->
  <div class="dialog-row-column">
    <h4>Resonance</h4>
    <div class="resonance-buttons">
      <input type="radio" name="resonance-choice" value="none" id="res-none" checked="checked" /><label for="res-none">None</label>
      <input type="radio" name="resonance-choice" value="slight" id="res-slight" /><label for="res-slight">Slight</label>
      <input type="radio" name="resonance-choice" value="firm" id="res-firm" /><label for="res-firm">Firm</label>
      <input type="radio" name="resonance-choice" value="strong" id="res-strong" /><label for="res-strong">Strong</label>
    </div>
  </div>
</form>
